name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write # needed only by the release job (tag pushes)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # compile + test (fake-transport unit tests need no wrangler/network) + fat JAR
      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: d1-jdbc-driver
          path: build/libs/d1-jdbc-driver-*.jar
          if-no-files-found: error

      - name: Attach JAR to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/d1-jdbc-driver-*.jar
